# CI FACAM ACADEMIA
# Exécuté sur chaque push et PR vers dev, main, stagging.
# Garantit que le code reste déployable et respecte les standards.

name: CI

on:
  push:
    branches: [dev, main, stagging]
  pull_request:
    branches: [dev, main, stagging]

env:
  HUSKY: '0'

defaults:
  run:
    shell: bash

jobs:
  lint-and-build:
    name: Lint, format check & build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
