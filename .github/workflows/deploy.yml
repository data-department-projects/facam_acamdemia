# CD — Déploiement production (FACAM ACADEMIA)
# Déclenché uniquement sur push vers la branche production.
# Vercel et Railway déploient automatiquement via leur intégration GitHub ;
# ce workflow vérifie que le build monorepo passe avant que les déploiements ne soient effectués.

name: Deploy (production)

on:
  push:
    branches:
      - production

defaults:
  run:
    shell: bash

jobs:
  build-for-deploy:
    name: Verify production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build monorepo for production
        run: npm run build
