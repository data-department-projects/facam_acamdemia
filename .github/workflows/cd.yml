# CD FACAM ACADEMIA
# Déploiement automatique sur Vercel après merge sur main.
# Vercel déclenche le déploiement via son intégration GitHub ; ce workflow
# peut notifier l'équipe ou lancer des post-deploy checks si besoin.

name: CD

on:
  push:
    branches: [main]

jobs:
  # Vercel déploie automatiquement via GitHub App ; ce job valide que le build passe.
  build-for-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Optionnel : notifier en cas d'échec (Slack, email, etc.)
      # - name: Notify on failure
      #   if: failure()
      #   run: ...
